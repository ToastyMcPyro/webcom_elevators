<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --bg-primary: rgba(10, 10, 18, 0.95);
    --border: rgba(100, 100, 160, 0.25);
    --accent: #3B82F6;
    --text-primary: #ffffff;
    --text-secondary: rgba(255, 255, 255, 0.75);
}

body {
    width: 512px;
    height: 512px;
    overflow: hidden;
    background: transparent;
    font-family: 'Inter', 'Segoe UI', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
}

.dui-card {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    background: var(--bg-primary);
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 36px 28px 32px;
    width: 440px;
    position: relative;
    overflow: hidden;
}

.dui-card.visible {
    display: flex;
}

/* Top accent bar */
.dui-card::before {
    content: '';
    position: absolute;
    top: 0; left: 40px; right: 40px; height: 3px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    border-radius: 0 0 2px 2px;
}

.dui-icon {
    width: 80px;
    height: 80px;
    border-radius: 18px;
    background: linear-gradient(135deg, var(--accent), rgba(59, 130, 246, 0.4));
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}

.dui-icon svg {
    width: 40px;
    height: 40px;
    fill: none;
    stroke: #fff;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
}

.dui-text {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    width: 100%;
    text-align: center;
}

.dui-elevator-label {
    font-size: 48px;
    font-weight: 900;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
    letter-spacing: -0.5px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.8);
}

.dui-floor-label {
    font-size: 32px;
    font-weight: 700;
    color: var(--text-secondary);
    text-shadow: 0 2px 8px rgba(0,0,0,0.6);
    letter-spacing: 0.5px;
}

.dui-divider {
    width: 60px;
    height: 2px;
    background: var(--accent);
    opacity: 0.5;
    border-radius: 1px;
}

.powered-by {
    position: absolute;
    left: 50%;
    bottom: 22px;
    transform: translateX(-50%);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.34);
}
</style>
</head>
<body>
<div class="dui-card" id="card">
    <div class="dui-icon" id="icon">
        <svg viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <line x1="12" y1="3" x2="12" y2="21"/>
            <polyline points="8 7 8 11"/>
            <polyline points="16 13 16 17"/>
        </svg>
    </div>
    <div class="dui-text">
        <div class="dui-elevator-label" id="elevLabel">Aufzug</div>
        <div class="dui-divider"></div>
        <div class="dui-floor-label" id="floorLabel">Erdgeschoss</div>
    </div>
    <div class="powered-by">Powered by WebCom</div>
</div>
<script>
const card = document.getElementById('card');
const elevLabel = document.getElementById('elevLabel');
const floorLabel = document.getElementById('floorLabel');

window.addEventListener('message', function(e) {
    const d = e.data;
    if (!d || !d.action) return;

    if (d.action === 'show') {
        elevLabel.textContent = d.elevatorLabel || 'Aufzug';
        floorLabel.textContent = d.floorLabel || '';
        if (d.color) {
            document.documentElement.style.setProperty('--accent', d.color);
        }
        card.classList.add('visible');
    } else if (d.action === 'hide') {
        card.classList.remove('visible');
    }
});
</script>
</body>
</html>
